<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Calculadoras Técnicas</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #fff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --card-bg: #162235;
            --input-bg: #080d16;
        }
        body.light-mode {
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --text-color: #1f2937;
            --card-bg: #e5e7eb;
            --input-bg: #f9fafb;
            --border-color: #d1d5db;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--chat-bg); padding: 12px; display: flex; align-items: center; border-bottom: 1px solid var(--border-color); gap: 12px; }
        .logo-container { width: 45px; height: 45px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); }
        .main-content { flex: 1; padding: 20px; margin-bottom: 75px; max-width: 700px; width: 100%; align-self: center; }
        .calc-container { background: var(--chat-bg); border-radius: 12px; padding: 16px; margin-bottom: 20px; border: 1px solid var(--border-color); }
        .selector-calculadora { width: 100%; padding: 10px; background: var(--bg-color); color: var(--text-color); border: 1px solid var(--border-color); border-radius: 8px; margin-bottom: 15px; }
        .calculator-card { display: none; }
        .calculator-card h3 { margin-bottom: 12px; color: var(--primary-color); }
        .grupo-input { margin-bottom: 12px; }
        .grupo-input label { display: block; font-size: 0.8rem; margin-bottom: 4px; }
        .calc-input { width: 100%; padding: 8px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 6px; }
        .btn-calc { background: var(--primary-color); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .result-box { background: var(--bg-color); padding: 12px; border-radius: 8px; margin-top: 12px; border-left: 4px solid var(--primary-color); font-size: 0.9rem; }
        nav.nav-tabs { position: fixed; bottom: 0; left: 0; width: 100%; height: 58px; background: var(--chat-bg); border-top: 1px solid var(--border-color); display: flex; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #a0aec0; font-size: 0.7rem; gap: 2px; }
        .nav-item.active { color: #a855f7; }
        .nav-icon { font-size: 1.3rem; }
        .header-buttons { margin-left: auto; display: flex; gap: 8px; }
        .theme-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-color); }
        .gamma-inputs-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
        @media (max-width: 500px) { .gamma-inputs-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<header>
    <div class="logo-container"><img src="logo.png" onerror="this.style.display='none'"></div>
    <div class="header-info"><h1>Calculadoras Técnicas</h1></div>
    <div class="header-buttons"><button id="themeToggle" class="theme-btn">🌓</button></div>
</header>
<div class="main-content">
    <div class="calc-container">
        <select id="calcSelector" class="selector-calculadora">
            <option value="smd">🎛️ Resistencias SMD</option>
            <option value="colores">🎨 Código de Colores (6 bandas)</option>
            <option value="ohm">⚡ Ley de Ohm</option>
            <option value="seriepar">⛓️ Serie/Paralelo</option>
            <option value="divisor">📉 Divisor de Voltaje</option>
            <option value="tcon" selected>🖥️ Diagnóstico T-CON</option>
        </select>

        <!-- SMD -->
        <div id="calc-smd" class="calculator-card"><h3>Lector SMD</h3><div class="grupo-input"><label>Código:</label><input type="text" id="smdCode" class="calc-input" placeholder="Ej: 103, 4702, 01A"></div><button class="btn-calc" onclick="calcSMD()">Calcular</button><div id="smdRes" class="result-box"></div></div>

        <!-- Código colores (simplificado, 6 bandas) -->
        <div id="calc-colores" class="calculator-card"><h3>Código de Colores</h3><p style="font-size:0.75rem; margin-bottom:8px;">Selecciona las 6 bandas:</p><div id="colorBands" style="display:grid; grid-template-columns:repeat(6,1fr); gap:5px; margin-bottom:12px;"></div><button class="btn-calc" onclick="calcColores()">Calcular</button><div id="coloresRes" class="result-box"></div></div>

        <!-- Ley de Ohm -->
        <div id="calc-ohm" class="calculator-card"><h3>Ley de Ohm</h3><div class="grupo-input"><label>Voltaje (V):</label><input type="number" id="ohmV" class="calc-input"></div><div class="grupo-input"><label>Corriente (A o mA):</label><input type="number" id="ohmI" class="calc-input"><select id="ohmUnit" style="margin-top:4px;"><option value="A">A</option><option value="mA">mA</option></select></div><div class="grupo-input"><label>Resistencia (Ω):</label><input type="number" id="ohmR" class="calc-input"></div><button class="btn-calc" onclick="calcOhm()">Calcular</button><div id="ohmRes" class="result-box"></div></div>

        <!-- Serie/Paralelo -->
        <div id="calc-seriepar" class="calculator-card"><h3>Serie / Paralelo</h3><div class="grupo-input"><label>Valores (separados por coma):</label><input type="text" id="spValues" class="calc-input" placeholder="Ej: 10, 22, 47"></div><button class="btn-calc" onclick="calcSeriePar()">Calcular</button><div id="spRes" class="result-box"></div></div>

        <!-- Divisor de voltaje -->
        <div id="calc-divisor" class="calculator-card"><h3>Divisor de Voltaje</h3><div class="grupo-input"><label>Vin (V):</label><input type="number" id="divVin" class="calc-input"></div><div class="grupo-input"><label>R1 (Ω):</label><input type="number" id="divR1" class="calc-input"></div><div class="grupo-input"><label>R2 (Ω):</label><input type="number" id="divR2" class="calc-input"></div><button class="btn-calc" onclick="calcDivisor()">Calcular Vout</button><div id="divRes" class="result-box"></div></div>

        <!-- Diagnóstico T-CON (completo) -->
        <div id="calc-tcon" class="calculator-card"><h3>Diagnóstico Maestro de T-CON / Panel</h3>
            <div class="grupo-input"><label>Síntoma visual:</label><select id="sintomaSelect" class="calc-input" onchange="mostrarGuiaSintoma()"><option value="">Seleccionar...</option><option value="blanca">Pantalla blanca</option><option value="lenta">Imagen lenta o congelada</option><option value="lavada">Imagen lavada</option><option value="negativo">Colores negativos / solarizada</option><option value="intermitente">Intermitente / doble imagen</option><option value="oscura">Se desvanece a negro</option></select><div id="guiaSintoma" class="result-box" style="margin-top:8px; display:none;"></div></div>
            <div class="grupo-input"><label>VCC / VDD (3.3V):</label><input type="number" step="0.01" id="vcc" class="calc-input"></div>
            <div class="grupo-input"><label>AVDD (15V):</label><input type="number" step="0.01" id="avdd" class="calc-input"></div>
            <div class="grupo-input"><label>VCOM (6V):</label><input type="number" step="0.01" id="vcom" class="calc-input"></div>
            <div class="grupo-input"><label>VGH / VON (25-32V):</label><input type="number" step="0.01" id="vgh" class="calc-input"></div>
            <div class="grupo-input"><label>VGL / VOFF (-5 a -12V):</label><input type="number" step="0.01" id="vgl" class="calc-input"></div>
            <div class="grupo-input"><label>Curva Gamma (3 puntos):</label><div class="gamma-inputs-grid"><input type="number" id="gammaAlto" placeholder="Alto (V)" class="calc-input"><input type="number" id="gammaMedio" placeholder="Medio (V)" class="calc-input"><input type="number" id="gammaBajo" placeholder="Bajo (V)" class="calc-input"></div></div>
            <div class="grupo-input"><label>Líneas CKV:</label><select id="ckvEstado" class="calc-input"><option value="ok">Impedancia alta (OK)</option><option value="corto_tierra">Corto a GND</option><option value="corto_entre">Corto entre líneas</option></select></div>
            <button class="btn-calc" onclick="diagnosticoTCON()">Generar Reporte</button>
            <div id="tconRes" class="result-box"></div>
        </div>
    </div>
</div>
<nav class="nav-tabs">
    <a href="index.html" class="nav-item"><span class="nav-icon">💬</span><span>Chat</span></a>
    <a href="notas.html" class="nav-item"><span class="nav-icon">📝</span><span>Notas</span></a>
    <a href="biblioteca.html" class="nav-item"><span class="nav-icon">📘</span><span>Biblioteca</span></a>
    <a href="hardware.html" class="nav-item"><span class="nav-icon">🖼️</span><span>Hardware</span></a>
    <a href="calculadoras.html" class="nav-item active"><span class="nav-icon">🧮</span><span>Cálculos</span></a>
    <a href="fallas.html" class="nav-item"><span class="nav-icon">🛠️</span><span>Casos</span></a>
    <a href="recepcion.html" class="nav-item"><span class="nav-icon">📋</span><span>Recepción</span></a>
</nav>
<script>
    // Tema
    const themeToggle = document.getElementById('themeToggle');
    function applyTheme(theme) { if(theme==='light') document.body.classList.add('light-mode'); else document.body.classList.remove('light-mode'); localStorage.setItem('relectronica_theme', theme); }
    applyTheme(localStorage.getItem('relectronica_theme')||'dark');
    themeToggle.onclick = () => applyTheme(document.body.classList.contains('light-mode')?'dark':'light');

    // Selector de calculadora
    const selector = document.getElementById('calcSelector');
    const calculators = ['smd','colores','ohm','seriepar','divisor','tcon'];
    function mostrarCalc(id) { calculators.forEach(c => document.getElementById(`calc-${c}`).style.display = c===id ? 'block' : 'none'); }
    selector.onchange = () => mostrarCalc(selector.value);
    mostrarCalc('tcon');

    // SMD
    function calcSMD() {
        let code = document.getElementById('smdCode').value.trim().toUpperCase();
        let res = document.getElementById('smdRes');
        if(!code){ res.innerHTML='Ingrese código'; return; }
        if(/^\d{3,4}$/.test(code)){ let base=parseInt(code.slice(0,-1)), mult=parseInt(code.slice(-1)), ohms=base*Math.pow(10,mult); res.innerHTML=`Resistencia: ${formatearOhms(ohms)}`; return; }
        if(code.includes('R')){ let ohms=parseFloat(code.replace('R','.')); if(!isNaN(ohms)){ res.innerHTML=`Resistencia: ${ohms} Ω`; return; } }
        const eia96 = {"01":100,"02":102,"03":105,"04":107,"05":110,"10":124,"47":301,"68":475,"82":698}; const mult = {"A":1,"B":10,"C":100,"D":1000,"X":0.1,"Y":0.01,"Z":0.001};
        if(code.length===3 && /^\d{2}[A-Z]$/.test(code)){ let num=code.slice(0,2), letra=code[2]; if(eia96[num] && mult[letra]){ res.innerHTML=`Resistencia: ${formatearOhms(eia96[num]*mult[letra])} (±1%)`; return; } }
        res.innerHTML='Código no reconocido';
    }
    function formatearOhms(o){ if(o>=1e6) return (o/1e6).toFixed(2)+' MΩ'; if(o>=1e3) return (o/1e3).toFixed(2)+' kΩ'; return o.toFixed(2)+' Ω'; }

    // Código colores (simplificado)
    const colores = [
        {nom:"Negro",val:0,mult:1},{nom:"Marrón",val:1,mult:10},{nom:"Rojo",val:2,mult:100},{nom:"Naranja",val:3,mult:1e3},{nom:"Amarillo",val:4,mult:1e4},{nom:"Verde",val:5,mult:1e5},{nom:"Azul",val:6,mult:1e6},{nom:"Violeta",val:7,mult:1e7},{nom:"Gris",val:8,mult:null},{nom:"Blanco",val:9,mult:null},{nom:"Oro",val:null,mult:0.1},{nom:"Plata",val:null,mult:0.01}
    ];
    function generarSelectores() {
        let container = document.getElementById('colorBands');
        for(let i=1;i<=6;i++){ let sel = document.createElement('select'); sel.id=`banda${i}`; sel.classList.add('calc-input'); sel.style.marginBottom='4px'; colores.forEach(c=>{ let opt=document.createElement('option'); opt.value=c.val!==null?c.val: (c.mult!==null?c.mult:''); opt.text=c.nom; sel.appendChild(opt); }); container.appendChild(sel); }
    }
    function calcColores(){ let val=0; for(let i=1;i<=3;i++){ let v=parseInt(document.getElementById(`banda${i}`).value); if(!isNaN(v)) val=val*10+v; } let mult=parseFloat(document.getElementById('banda4').value); let res=val*mult; document.getElementById('coloresRes').innerHTML=`Resistencia: ${formatearOhms(res)}`; }
    generarSelectores();

    // Ley de Ohm
    function calcOhm(){
        let v=parseFloat(document.getElementById('ohmV').value), i=parseFloat(document.getElementById('ohmI').value), r=parseFloat(document.getElementById('ohmR').value);
        let unit=document.getElementById('ohmUnit').value; if(!isNaN(i) && unit==='mA') i/=1000;
        let known=0; if(!isNaN(v)) known++; if(!isNaN(i)) known++; if(!isNaN(r)) known++;
        if(known<2){ document.getElementById('ohmRes').innerHTML='Introduce al menos dos valores'; return; }
        if(isNaN(v)) v=i*r; else if(isNaN(i)) i=v/r; else if(isNaN(r)) r=v/i;
        let p=v*i; document.getElementById('ohmRes').innerHTML=`V=${v.toFixed(3)} V<br>I=${(i*1000).toFixed(2)} mA<br>R=${r.toFixed(2)} Ω<br>P=${p.toFixed(3)} W`;
    }

    // Serie/Paralelo
    function calcSeriePar(){
        let raw=document.getElementById('spValues').value; let vals=raw.split(',').map(v=>parseFloat(v.trim())).filter(v=>!isNaN(v)&&v>0);
        if(vals.length===0){ document.getElementById('spRes').innerHTML='Valores inválidos'; return; }
        let serie=vals.reduce((a,b)=>a+b,0); let paralelo=1/vals.reduce((a,b)=>a+1/b,0);
        document.getElementById('spRes').innerHTML=`Serie: ${serie.toFixed(2)}<br>Paralelo: ${paralelo.toFixed(2)}`;
    }

    // Divisor
    function calcDivisor(){
        let vin=parseFloat(document.getElementById('divVin').value), r1=parseFloat(document.getElementById('divR1').value), r2=parseFloat(document.getElementById('divR2').value);
        if(isNaN(vin)||isNaN(r1)||isNaN(r2)||r1<=0||r2<=0){ document.getElementById('divRes').innerHTML='Valores inválidos (R>0)'; return; }
        let vout=vin*(r2/(r1+r2)); document.getElementById('divRes').innerHTML=`Vout = ${vout.toFixed(3)} V<br>Corriente = ${(vin/(r1+r2)*1000).toFixed(2)} mA`;
    }

    // Diagnóstico T-CON
    function mostrarGuiaSintoma(){
        let sint=document.getElementById('sintomaSelect').value;
        let guiaDiv=document.getElementById('guiaSintoma');
        if(!sint){ guiaDiv.style.display='none'; return; }
        guiaDiv.style.display='block';
        let textos={blanca:"Posible falta AVDD o VGH. Mide fusible.",lenta:"Revisa VGH (debe >20V).",lavada:"Verifica VCOM (5-7V).",negativo:"Posible falla en Gamma IC (AS15).",intermitente:"Probar aislamiento de CKVs.",oscura:"VGH se cae por corto en driver."};
        guiaDiv.innerHTML=textos[sint]||"Consulta voltajes de la T-CON.";
    }
    function diagnosticoTCON(){
        let vcc=parseFloat(document.getElementById('vcc').value), avdd=parseFloat(document.getElementById('avdd').value), vcom=parseFloat(document.getElementById('vcom').value), vgh=parseFloat(document.getElementById('vgh').value), vgl=parseFloat(document.getElementById('vgl').value);
        let gammaAlto=parseFloat(document.getElementById('gammaAlto').value), gammaMedio=parseFloat(document.getElementById('gammaMedio').value), gammaBajo=parseFloat(document.getElementById('gammaBajo').value);
        let ckv=document.getElementById('ckvEstado').value;
        let reporte='';
        if(!isNaN(vcc)) reporte+= (vcc>=3.0&&vcc<=3.6)?`✅ VCC=${vcc}V ok\n`:`❌ VCC=${vcc}V fuera de rango (3.3V)\n`;
        if(!isNaN(avdd)) reporte+= (avdd>=13&&avdd<=17)?`✅ AVDD=${avdd}V ok\n`:`❌ AVDD=${avdd}V anormal (debe ~15V)\n`;
        if(!isNaN(vcom)) reporte+= (vcom>=4.5&&vcom<=7.5)?`✅ VCOM=${vcom}V ok\n`:`⚠️ VCOM=${vcom}V descalibrado\n`;
        if(!isNaN(vgh)) reporte+= (vgh>=20&&vgh<=35)?`✅ VGH=${vgh}V ok\n`:`❌ VGH=${vgh}V defectuoso (debe 25-32V)\n`;
        if(!isNaN(vgl)) reporte+= (vgl>=-12 && vgl<=-5)?`✅ VGL=${vgl}V ok\n`:`❌ VGL=${vgl}V anormal (debe -5 a -12V)\n`;
        if(!isNaN(gammaAlto) && !isNaN(gammaMedio) && !isNaN(gammaBajo)){
            if(gammaAlto>gammaMedio && gammaMedio>gammaBajo) reporte+=`✅ Curva Gamma descendente: ${gammaAlto} > ${gammaMedio} > ${gammaBajo}\n`;
            else reporte+=`❌ Curva Gamma no es monotónica. Posible IC Gamma dañado.\n`;
        }
        if(ckv==='corto_tierra') reporte+=`❌ Líneas CKV en corto a GND. Aislar flex.\n`;
        if(ckv==='corto_entre') reporte+=`❌ Corto entre líneas CKV. Separar pistas.\n`;
        document.getElementById('tconRes').innerHTML=reporte || 'Introduce al menos una lectura.';
    }
    window.diagnosticoTCON = diagnosticoTCON;
    window.mostrarGuiaSintoma = mostrarGuiaSintoma;
    window.calcSMD = calcSMD; window.calcColores = calcColores; window.calcOhm = calcOhm; window.calcSeriePar = calcSeriePar; window.calcDivisor = calcDivisor;
</script>
</body>
</html>
