<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Biblioteca Técnica</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --card-bg: #162235;
        }
        body.light-mode {
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --text-color: #1f2937;
            --card-bg: #e5e7eb;
        }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; }
        header { background: var(--chat-bg); padding: 12px; display: flex; align-items: center; border-bottom: 1px solid var(--border-color); gap: 12px; }
        .logo-container { width: 45px; height: 45px; background: #000; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); }
        .main-content { flex:1; padding: 20px; margin-bottom: 75px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .card { background: var(--chat-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .card h3 { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .card-content { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-color); }
        .btn-agregar { background: var(--primary-color); color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 20px; cursor: pointer; }
        .modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: var(--chat-bg); padding: 20px; border-radius: 12px; width: 90%; max-width: 500px; }
        .modal-content input, .modal-content textarea { width: 100%; margin-bottom: 12px; padding: 8px; background: var(--bg-color); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 6px; }
        .close-modal { float: right; cursor: pointer; font-size: 1.5rem; }
        nav.nav-tabs { position: fixed; bottom:0; left:0; width:100%; height:58px; background: var(--chat-bg); border-top:1px solid var(--border-color); display: flex; z-index:100; }
        .nav-item { flex:1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: #a0aec0; font-size:0.7rem; gap:2px; }
        .nav-item.active { color: #a855f7; }
        .nav-icon { font-size: 1.3rem; }
        .header-buttons { margin-left: auto; display: flex; gap: 8px; }
        .theme-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--text-color); }
    </style>
</head>
<body>
    <header>
        <div class="logo-container"><img src="logo.png" onerror="this.style.display='none'"></div>
        <div class="header-info"><h1>Biblioteca Técnica</h1></div>
        <div class="header-buttons"><button id="themeToggle" class="theme-btn">🌓</button></div>
    </header>
    <div class="main-content">
        <button class="btn-agregar" id="openModalBtn">➕ Agregar nuevo concepto</button>
        <input type="text" id="searchLib" placeholder="🔍 Buscar en biblioteca..." style="width:100%; padding:10px; margin-bottom:20px; border-radius:8px; border:1px solid var(--border-color); background:var(--chat-bg); color:var(--text-color);">
        <div id="biblioteca-list"></div>
    </div>
    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <h3>Nuevo concepto técnico</h3>
            <input type="text" id="newTitle" placeholder="Título (ej: Voltaje VGH)">
            <textarea id="newBody" rows="4" placeholder="Explicación detallada, síntomas, valores..."></textarea>
            <button id="saveConcept" class="btn-agregar" style="margin-top:10px;">Guardar</button>
        </div>
    </div>
    <nav class="nav-tabs">
        <a href="index.html" class="nav-item"><span class="nav-icon">💬</span><span>Chat</span></a>
        <a href="notas.html" class="nav-item"><span class="nav-icon">📝</span><span>Notas</span></a>
        <a href="biblioteca.html" class="nav-item active"><span class="nav-icon">📘</span><span>Biblioteca</span></a>
        <a href="hardware.html" class="nav-item"><span class="nav-icon">🖼️</span><span>Hardware</span></a>
        <a href="calculadoras.html" class="nav-item"><span class="nav-icon">🧮</span><span>Cálculos</span></a>
        <a href="fallas.html" class="nav-item"><span class="nav-icon">🛠️</span><span>Casos</span></a>
        <a href="recepcion.html" class="nav-item"><span class="nav-icon">📋</span><span>Recepción</span></a>
    </nav>
    <script>
        function applyTheme(theme) { if(theme==='light') document.body.classList.add('light-mode'); else document.body.classList.remove('light-mode'); localStorage.setItem('relectronica_theme', theme); }
        const savedTheme = localStorage.getItem('relectronica_theme')||'dark';
        applyTheme(savedTheme);
        document.getElementById('themeToggle').addEventListener('click',()=>{ applyTheme(document.body.classList.contains('light-mode')?'dark':'light'); });

        let biblioteca = JSON.parse(localStorage.getItem('relectronica_biblioteca')||'[]');
        function guardarBiblioteca() { localStorage.setItem('relectronica_biblioteca', JSON.stringify(biblioteca)); renderizar(); }
        function renderizar() {
            const container = document.getElementById('biblioteca-list');
            if(!biblioteca.length){ container.innerHTML='<p>No hay conceptos. Agrega uno.</p>'; return; }
            container.innerHTML = biblioteca.map((item, idx) => `
                <div class="card" onclick="toggleCard(this)">
                    <h3>${escapeHtml(item.titulo)} <span style="font-size:0.7rem;">▼</span></h3>
                    <div class="card-content">${escapeHtml(item.contenido).replace(/\n/g,'<br>')}</div>
                    <button class="btn-recopiar" style="background:#dc2626; margin-top:8px;" onclick="event.stopPropagation(); eliminarConcepto(${idx})">Eliminar</button>
                </div>
            `).join('');
        }
        function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        function toggleCard(card) { const content = card.querySelector('.card-content'); if(content.style.display === 'block') content.style.display = 'none'; else content.style.display = 'block'; }
        function eliminarConcepto(idx) { biblioteca.splice(idx,1); guardarBiblioteca(); }
        document.getElementById('openModalBtn').onclick = () => { document.getElementById('modal').style.display = 'flex'; };
        document.getElementById('closeModal').onclick = () => { document.getElementById('modal').style.display = 'none'; };
        document.getElementById('saveConcept').onclick = () => {
            let titulo = document.getElementById('newTitle').value.trim();
            let contenido = document.getElementById('newBody').value.trim();
            if(!titulo || !contenido) { alert("Completa ambos campos"); return; }
            biblioteca.push({ titulo, contenido });
            guardarBiblioteca();
            document.getElementById('newTitle').value = '';
            document.getElementById('newBody').value = '';
            document.getElementById('modal').style.display = 'none';
        };
        document.getElementById('searchLib').addEventListener('input', function(e) {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.card').forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(term) ? 'block' : 'none';
            });
        });
        renderizar();
        window.onclick = function(e) { if(e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
    </script>
</body>
</html>
