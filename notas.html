<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="estilo.css">
    <title>Relectrónica - Mis Notas de Taller</title>
</head>
<body>

    <header>
        <div class="logo-container">R</div>
        <h1>Mis Notas de Taller</h1>
    </header>

    <div style="display: flex; gap: 10px; padding: 15px; background: #111c2c;">
        <button onclick="exportarNotas()" class="btn-calc" style="background:#10b981; flex:1;">💾 Exportar</button>
        <button onclick="document.getElementById('importFile').click()" class="btn-calc" style="background:#64748b; flex:1;">📂 Importar</button>
        <input type="file" id="importFile" style="display:none" onchange="importarNotas(event)">
    </div>

    <div id="notes-list-container">
        </div>

    <script>
        // --- FUNCIÓN PRINCIPAL DE CARGA ---
        function mostrarNotas() {
            const contenedor = document.getElementById('notes-list-container');
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            
            contenedor.innerHTML = ""; // Limpiar antes de pintar
            
            notas.forEach(nota => {
                const div = document.createElement('div');
                div.className = 'tech-card';
                div.innerHTML = `
                    <h3>${nota.titulo || 'Sin título'}</h3>
                    <p>${nota.contenido || ''}</p>
                    <button onclick="eliminarNota(${nota.id})" style="background:#ef4444; border:none; color:white; padding:5px 10px; border-radius:4px; margin-top:10px;">Eliminar</button>
                `;
                contenedor.appendChild(div);
            });
        }

        // --- FUNCIONES DE BACKUP ---
        function exportarNotas() {
            const notas = localStorage.getItem('relectronica_notas');
            if (!notas) {
                alert("No hay notas para exportar.");
                return;
            }
            const blob = new Blob([notas], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_relectronica_notas.json';
            a.click();
        }

        function importarNotas(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const notas = JSON.parse(e.target.result);
                    localStorage.setItem('relectronica_notas', JSON.stringify(notas));
                    alert("¡Backup importado con éxito!");
                    location.reload(); 
                } catch (err) {
                    alert("Error al importar: el archivo no es válido.");
                }
            };
            reader.readAsText(file);
        }

        // --- FUNCIÓN ELIMINAR ---
        function eliminarNota(id) {
            if (confirm("¿Estás seguro de que quieres borrar esta nota?")) {
                let notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
                notas = notas.filter(nota => nota.id !== id);
                localStorage.setItem('relectronica_notas', JSON.stringify(notas));
                mostrarNotas();
            }
        }

        // Cargar notas al iniciar
        mostrarNotas();
    </script>
</body>
</html>
