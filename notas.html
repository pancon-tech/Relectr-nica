<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Mis Notas de Taller</title>
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --card-bg: #162235;
            --input-bg: #080d16;
            --success-color: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--chat-bg); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border-color); gap: 15px; }
        .input-section { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        input, textarea { background: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 12px; border-radius: 8px; }
        button { background: var(--primary-color); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Contenedor de Backup (añadido discretamente) */
        .backup-container { display: flex; gap: 10px; padding: 0 15px 15px 15px; }
        .backup-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; color: white; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">R</div>
        <h1>Mis Notas de Taller</h1>
    </header>

    <div class="input-section">
        <input type="text" id="titulo" placeholder="Título de la nota...">
        <textarea id="contenido" placeholder="Contenido de la nota..." rows="3"></textarea>
        <button onclick="guardarNota()">Guardar Nota</button>
    </div>

    <div class="backup-container">
        <button class="backup-btn" style="background:#10b981;" onclick="exportarNotas()">💾 Exportar</button>
        <button class="backup-btn" style="background:#64748b;" onclick="document.getElementById('importFile').click()">📂 Importar</button>
        <input type="file" id="importFile" style="display:none" onchange="importarNotas(event)">
    </div>

    <input type="text" id="buscador" placeholder="Buscar notas..." oninput="filtrarNotas()" style="margin: 0 15px 15px 15px;">

    <div id="notes-list-container"></div>

    <script>
        // --- TU LÓGICA ORIGINAL ---
        function guardarNota() {
            const titulo = document.getElementById('titulo').value;
            const contenido = document.getElementById('contenido').value;
            if (!titulo || !contenido) return;
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            notas.push({ id: Date.now(), titulo, contenido });
            localStorage.setItem('relectronica_notas', JSON.stringify(notas));
            document.getElementById('titulo').value = "";
            document.getElementById('contenido').value = "";
            mostrarNotas();
        }

        function mostrarNotas() {
            const contenedor = document.getElementById('notes-list-container');
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            contenedor.innerHTML = "";
            notas.forEach(n => {
                contenedor.innerHTML += `<div class="tech-card" style="margin:15px; padding:15px; background:var(--card-bg); border-radius:8px;">
                    <h3>${n.titulo}</h3><p>${n.contenido}</p>
                    <button style="background:#ef4444; margin-top:10px;" onclick="eliminarNota(${n.id})">Eliminar</button>
                </div>`;
            });
        }

        function eliminarNota(id) {
            let notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            notas = notas.filter(n => n.id !== id);
            localStorage.setItem('relectronica_notas', JSON.stringify(notas));
            mostrarNotas();
        }

        function filtrarNotas() {
            // ... lógica original de filtrado ...
        }

        // --- FUNCIONES DE BACKUP (AÑADIDAS AL FINAL) ---
        function exportarNotas() {
            const data = localStorage.getItem('relectronica_notas');
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'backup_relectronica.json';
            a.click();
        }

        function importarNotas(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                localStorage.setItem('relectronica_notas', ev.target.result);
                mostrarNotas();
                alert("Backup importado");
            };
            reader.readAsText(e.target.files[0]);
        }

        mostrarNotas();
    </script>
</body>
</html>
