<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Mis Notas de Taller</title>
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --card-bg: #162235;
            --input-bg: #080d16;
            --success-color: #10b981;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: var(--chat-bg); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid var(--border-color); gap: 15px; }
        /* Tus estilos originales se mantienen intactos */
        .note-input-container { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        input, textarea { background: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 5px; }
        .add-btn { background: var(--primary-color); color: white; border: none; padding: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        /* Contenedor de botones nuevos */
        .backup-btns { display: flex; gap: 10px; padding: 0 15px 15px 15px; }
        .backup-btn { flex: 1; padding: 8px; border: none; border-radius: 5px; color: white; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header>
        <h1>Mis Notas de Taller</h1>
    </header>

    <div class="note-input-container">
        <input type="text" id="titulo" placeholder="Título...">
        <textarea id="contenido" placeholder="Contenido..."></textarea>
        <button class="add-btn" onclick="guardarNota()">Guardar</button>
    </div>

    <div class="backup-btns">
        <button class="backup-btn" style="background:#10b981;" onclick="exportarNotas()">💾 Exportar</button>
        <button class="backup-btn" style="background:#64748b;" onclick="document.getElementById('importFile').click()">📂 Importar</button>
        <input type="file" id="importFile" style="display:none" onchange="importarNotas(event)">
    </div>

    <div id="notes-list-container"></div>

    <script>
        // Tu lógica original + Funciones de Backup
        function guardarNota() { /* ... tu lógica original ... */ }
        function mostrarNotas() { /* ... tu lógica original ... */ }
        function eliminarNota(id) { /* ... tu lógica original ... */ }

        // Lógica de Backup
        function exportarNotas() {
            const data = localStorage.getItem('relectronica_notas');
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'backup_relectronica.json';
            a.click();
        }

        function importarNotas(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                localStorage.setItem('relectronica_notas', ev.target.result);
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }
        
        mostrarNotas();
    </script>
</body>
</html>
