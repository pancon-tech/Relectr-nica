<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Mis Notas de Taller</title>
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --card-bg: #162235;
            --input-bg: #080d16;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 15px;
        }

        .logo-container {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            overflow: hidden;
            background: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .input-container { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        input, textarea { background: var(--input-bg); border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 5px; }
        button { background: var(--primary-color); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #notes-list-container { padding: 15px; }
        .tech-card { background: var(--card-bg); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid var(--primary-color); }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">R</div>
        <h1>Mis Notas de Taller</h1>
    </header>

    <div class="input-container">
        <input type="text" id="titulo" placeholder="Título de la nota...">
        <textarea id="contenido" placeholder="Descripción de la falla o solución..." rows="3"></textarea>
        <button onclick="guardarNota()">Guardar Solución</button>
    </div>

    <input type="text" id="buscador" placeholder="Buscar en notas..." oninput="filtrarNotas()" style="margin: 0 15px;">

    <div id="notes-list-container"></div>

    <div style="display: flex; gap: 10px; padding: 15px; margin-top: auto;">
        <button onclick="exportarNotas()" style="background:#10b981; flex:1;">Exportar</button>
        <button onclick="document.getElementById('importFile').click()" style="background:#64748b; flex:1;">Importar</button>
        <input type="file" id="importFile" style="display:none" onchange="importarNotas(event)">
    </div>

    <script>
        function guardarNota() {
            const titulo = document.getElementById('titulo').value;
            const contenido = document.getElementById('contenido').value;
            if (!titulo || !contenido) return;
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            notas.push({ id: Date.now(), titulo, contenido });
            localStorage.setItem('relectronica_notas', JSON.stringify(notas));
            document.getElementById('titulo').value = "";
            document.getElementById('contenido').value = "";
            mostrarNotas();
        }

        function mostrarNotas() {
            const contenedor = document.getElementById('notes-list-container');
            const notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
            contenedor.innerHTML = "";
            notas.forEach(nota => {
                const div = document.createElement('div');
                div.className = 'tech-card';
                div.innerHTML = `<h3>${nota.titulo}</h3><p>${nota.contenido}</p><button onclick="eliminarNota(${nota.id})" style="background:#ef4444; margin-top:10px;">Eliminar</button>`;
                contenedor.appendChild(div);
            });
        }

        function filtrarNotas() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            document.querySelectorAll('.tech-card').forEach(tarjeta => {
                tarjeta.style.display = tarjeta.innerText.toLowerCase().includes(busqueda) ? "block" : "none";
            });
        }

        function eliminarNota(id) {
            if (confirm("¿Estás seguro de que quieres borrar esta solución de tu bitácora?")) {
                let notas = JSON.parse(localStorage.getItem('relectronica_notas')) || [];
                notas = notas.filter(nota => nota.id !== id);
                localStorage.setItem('relectronica_notas', JSON.stringify(notas));
                mostrarNotas();
            }
        }

        // --- FUNCIONES DE BACKUP ---
        function exportarNotas() {
            const data = localStorage.getItem('relectronica_notas');
            if(!data) return alert("No hay notas para exportar.");
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'backup_relectronica.json';
            a.click();
        }

        function importarNotas(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                localStorage.setItem('relectronica_notas', ev.target.result);
                mostrarNotas();
                alert("Notas importadas correctamente.");
            };
            reader.readAsText(e.target.files[0]);
        }

        mostrarNotas();
    </script>
</body>
</html>
