<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="estilo.css">
    <title>Relectrónica - Mis Notas de Taller</title>
</head>
<body>

    <header>
        <div class="logo-container">R</div>
        <h1>Mis Notas de Taller</h1>
    </header>

    <div style="display: flex; gap: 10px; padding: 15px; background: #111c2c;">
        <button onclick="exportarNotas()" class="btn-calc" style="background:#10b981; flex:1;">💾 Exportar Backup</button>
        <button onclick="document.getElementById('importFile').click()" class="btn-calc" style="background:#64748b; flex:1;">📂 Importar Backup</button>
        <input type="file" id="importFile" style="display:none" onchange="importarNotas(event)">
    </div>

    <div id="notes-list-container">
        </div>

    <script>
        // --- TUS FUNCIONES DE NOTAS ---
        function mostrarNotas() {
            // Asegúrate de que esta función exista según tu código original
        }

        // --- FUNCIONES DE BACKUP ---
        function exportarNotas() {
            const notas = localStorage.getItem('relectronica_notas');
            if (!notas) {
                alert("No hay notas para exportar.");
                return;
            }
            const blob = new Blob([notas], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'backup_relectronica_notas.json';
            a.click();
        }

        function importarNotas(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const notas = JSON.parse(e.target.result);
                    localStorage.setItem('relectronica_notas', JSON.stringify(notas));
                    alert("¡Backup importado con éxito!");
                    location.reload(); 
                } catch (err) {
                    alert("Error al importar: el archivo no es válido.");
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
