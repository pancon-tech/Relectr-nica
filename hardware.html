<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Hardware</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg-color: #0b131f;
            --chat-bg: #111c2c;
            --text-color: #ffffff;
            --primary-color: #7928ca;
            --border-color: #22344d;
            --card-bg: #162235;
        }

        body.light-mode {
            --bg-color: #f3f4f6;
            --chat-bg: #ffffff;
            --text-color: #1f2937;
            --card-bg: #e5e7eb;
            --border-color: #d1d5db;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--chat-bg);
            padding: 12px 15px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
        }

        .logo-container {
            width: 45px;
            height: 45px;
            background-color: #000;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .header-info h1 {
            font-size: 1.1rem;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            margin-bottom: 75px;
            max-width: 900px;
            width: 100%;
            align-self: center;
        }

        .search-bar {
            width: 100%;
            background-color: var(--chat-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }

        .hardware-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .hardware-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .hardware-card:hover {
            transform: translateY(-3px);
            border-color: var(--primary-color);
        }

        .image-container {
            width: 100%;
            height: 130px;
            background-color: #080d16;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 8px;
        }

        .card-info h3 {
            font-size: 0.8rem;
            font-weight: 600;
        }

        .image-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .modal-content {
            max-width: 90%;
            max-height: 80%;
        }

        .modal-content img {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .modal-title {
            color: white;
            margin-top: 15px;
            font-size: 1rem;
            text-align: center;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: #a0aec0;
            cursor: pointer;
        }

        nav.nav-tabs {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 58px;
            background-color: var(--chat-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #a0aec0;
            font-size: 0.7rem;
            gap: 2px;
        }

        .nav-item.active {
            color: #a855f7;
        }

        .nav-icon {
            font-size: 1.3rem;
        }

        .header-buttons {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .theme-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--text-color);
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="Logo" onerror="this.style.display='none'">
    </div>
    <div class="header-info">
        <h1>Hardware - Galería Técnica</h1>
    </div>
    <div class="header-buttons">
        <button id="themeToggle" class="theme-btn">🌓</button>
    </div>
</header>

<div class="main-content">
    <input type="text" id="hardware-search" class="search-bar" placeholder="🔍 Buscar tarjetas o componentes...">
    <div class="hardware-grid" id="hardware-grid">
        <!-- Ejemplos de tarjetas (puedes añadir más) -->
        <div class="hardware-card" onclick="openImage('imagenes/TconTT5461B032C1.png', 'TCON TT5461B03-2-C-1')">
            <div class="image-container"><img src="imagenes/TconTT5461B032C1.png" alt="TCON" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23333%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22white%22%3EImagen no disponible%3C/text%3E%3C/svg%3E'"></div>
            <div class="card-info"><h3>TCON TT5461B03-2-C-1</h3></div>
        </div>
        <div class="hardware-card" onclick="openImage('imagenes/fuente.jpg', 'Fuente Conmutada SMPS')">
            <div class="image-container"><img src="imagenes/fuente.jpg" alt="Fuente" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23333%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22white%22%3EImagen no disponible%3C/text%3E%3C/svg%3E'"></div>
            <div class="card-info"><h3>Fuente Conmutada</h3></div>
        </div>
        <div class="hardware-card" onclick="openImage('imagenes/regulador.jpg', 'Regulador TO-220')">
            <div class="image-container"><img src="imagenes/regulador.jpg" alt="Regulador" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23333%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22white%22%3EImagen no disponible%3C/text%3E%3C/svg%3E'"></div>
            <div class="card-info"><h3>Regulador TO-220</h3></div>
        </div>
        <div class="hardware-card" onclick="openImage('imagenes/display.jpg', 'Estructura Display LCD')">
            <div class="image-container"><img src="imagenes/display.jpg" alt="Display" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23333%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22white%22%3EImagen no disponible%3C/text%3E%3C/svg%3E'"></div>
            <div class="card-info"><h3>Panel LCD / Display</h3></div>
        </div>
    </div>
</div>

<div id="imageModal" class="image-modal" onclick="closeImage()">
    <span class="close-modal" onclick="closeImage()">&times;</span>
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="modalImg" src="" alt="Ampliada">
        <div id="modalTitle" class="modal-title"></div>
    </div>
</div>

<nav class="nav-tabs">
    <a href="index.html" class="nav-item"><span class="nav-icon">💬</span><span>Chat</span></a>
    <a href="notas.html" class="nav-item"><span class="nav-icon">📝</span><span>Notas</span></a>
    <a href="biblioteca.html" class="nav-item"><span class="nav-icon">📘</span><span>Biblioteca</span></a>
    <a href="hardware.html" class="nav-item active"><span class="nav-icon">🖼️</span><span>Hardware</span></a>
    <a href="calculadoras.html" class="nav-item"><span class="nav-icon">🧮</span><span>Cálculos</span></a>
    <a href="fallas.html" class="nav-item"><span class="nav-icon">🛠️</span><span>Casos</span></a>
    <a href="recepcion.html" class="nav-item"><span class="nav-icon">📋</span><span>Recepción</span></a>
</nav>

<script>
    // Tema oscuro/claro
    const themeToggle = document.getElementById('themeToggle');
    function applyTheme(theme) {
        if (theme === 'light') document.body.classList.add('light-mode');
        else document.body.classList.remove('light-mode');
        localStorage.setItem('relectronica_theme', theme);
    }
    const savedTheme = localStorage.getItem('relectronica_theme') || 'dark';
    applyTheme(savedTheme);
    themeToggle.addEventListener('click', () => {
        const newTheme = document.body.classList.contains('light-mode') ? 'dark' : 'light';
        applyTheme(newTheme);
    });

    // Visor de imagen
    function openImage(src, title) {
        const modal = document.getElementById('imageModal');
        const img = document.getElementById('modalImg');
        const titleSpan = document.getElementById('modalTitle');
        img.src = src;
        titleSpan.innerText = title;
        modal.style.display = 'flex';
    }
    function closeImage() {
        document.getElementById('imageModal').style.display = 'none';
    }

    // Buscador
    document.getElementById('hardware-search').addEventListener('input', function(e) {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.hardware-card').forEach(card => {
            const text = card.innerText.toLowerCase();
            card.style.display = text.includes(term) ? 'flex' : 'none';
        });
    });
</script>
</body>
</html>
