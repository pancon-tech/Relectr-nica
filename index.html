<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relectrónica - Asistente Técnico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        
        /* CONTENEDOR DEL CHAT CON TU LOGO OFICIAL */
        .chat-container { 
            height: calc(100vh - 180px); 
            position: relative;
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 280px; /* Tamaño de la marca de agua en el medio */
        }

        /* CAPA DE OPACIDAD PARA LA MARCA DE AGUA */
        .chat-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #0d1117;
            opacity: 0.88; /* Balance: el logo se nota claro y las burbujas de texto flotan legibles */
            z-index: 0;
        }

        /* Fuerza a que los mensajes se rendericen por encima del fondo */
        .chat-container * {
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body class="font-sans antialiased flex flex-col h-screen">

    <header class="bg-[#161b22] border-b border-[#30363d] p-4 flex items-center justify-between shadow-md">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-lg overflow-hidden border border-[#30363d] bg-[#0d1117] flex items-center justify-center">
                <img id="header-logo" class="w-full h-full object-cover" alt="Logo">
            </div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-wide">Relectrónica</h1>
                <p class="text-xs text-purple-400 flex items-center">
                    <span class="w-2 h-2 rounded-full bg-purple-500 inline-block mr-1 animate-pulse"></span> 
                    Línea Técnica Activa
                </p>
            </div>
        </div>
    </header>

    <main id="chat-box" class="flex-1 p-4 overflow-y-auto chat-container space-y-4"></main>

    <div id="image-preview-container" class="hidden bg-[#161b22] px-4 py-2 border-t border-[#30363d] flex items-center space-x-2">
        <div class="relative">
            <img id="image-preview" class="w-14 h-14 object-cover rounded-lg border border-gray-500">
            <button id="remove-image-btn" class="absolute -top-2 -right-2 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shadow">×</button>
        </div>
        <span class="text-xs text-gray-400">Imagen acoplada en interfaz...</span>
    </div>

    <footer class="bg-[#161b22] border-t border-[#30363d] p-3 flex items-center space-x-2">
        <label for="file-input" class="cursor-pointer bg-[#21262d] hover:bg-[#30363d] text-gray-300 p-3 rounded-xl transition duration-200 shadow-md flex items-center justify-center select-none">
            📸
            <input type="file" id="file-input" accept="image/*" class="hidden">
        </label>

        <input type="text" id="user-input" 
               class="flex-1 bg-[#0d1117] border border-[#30363d] rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 text-sm" 
               placeholder="Escribe la falla...">
        <button id="send-btn" class="bg-purple-600 hover:bg-purple-700 text-white font-bold px-5 py-3 rounded-xl transition duration-200 text-sm shadow-md">
            Enviar
        </button>
    </footer>
